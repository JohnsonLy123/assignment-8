<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personality Quiz</title>
    <link rel="icon" type="image/x-icon" href="/img/ideas.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href ="./css/style.css">
</head>
<body>
    <h1 class="text-center mt-4">Personality Quiz</h1>
    
    <!-- Start quiz element -->
    <div class="container d-flex justify-content-center" id="question-1">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">YOUR QUIZ QUESTION HERE</h4>
        <div class="row g-2">
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-answer="A">ANSWER CHOICE A</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-answer="B">ANSWER CHOICE B</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-answer="C">ANSWER CHOICE C</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-answer="D">ANSWER CHOICE D</button>
          </div>
        </div>
      </div>
    </div>

    <h1 class="text-center mt-4">What Type of Person Are You?</h1>

<!-- Question 1 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>What’s your ideal weekend?</h4>
    <button class="btn btn-outline-primary answer-btn" data-type="explorer">Travel somewhere new 🌍</button>
    <button class="btn btn-outline-primary answer-btn" data-type="artist">Create art or music 🎨</button>
    <button class="btn btn-outline-primary answer-btn" data-type="leader">Plan something with friends 💼</button>
    <button class="btn btn-outline-primary answer-btn" data-type="thinker">Read or learn something 🧠</button>
  </div>
</div>

<!-- Question 2 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>How do you handle problems?</h4>
    <button class="btn btn-outline-primary answer-btn" data-type="explorer">Try something new</button>
    <button class="btn btn-outline-primary answer-btn" data-type="artist">Express feelings creatively</button>
    <button class="btn btn-outline-primary answer-btn" data-type="leader">Take charge</button>
    <button class="btn btn-outline-primary answer-btn" data-type="thinker">Analyze deeply</button>
  </div>
</div>

<!-- Question 3 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>Pick a hobby:</h4>
    <button class="btn btn-outline-primary answer-btn" data-type="explorer">Hiking / exploring</button>
    <button class="btn btn-outline-primary answer-btn" data-type="artist">Drawing / music</button>
    <button class="btn btn-outline-primary answer-btn" data-type="leader">Leading a team</button>
    <button class="btn btn-outline-primary answer-btn" data-type="thinker">Coding / puzzles</button>
  </div>
</div>

<!-- Question 4 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>What motivates you most?</h4>
    <button class="btn btn-outline-primary answer-btn" data-type="explorer">New experiences</button>
    <button class="btn btn-outline-primary answer-btn" data-type="artist">Self-expression</button>
    <button class="btn btn-outline-primary answer-btn" data-type="leader">Success</button>
    <button class="btn btn-outline-primary answer-btn" data-type="thinker">Knowledge</button>
  </div>
</div>

<!-- Question 5 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>Your friends describe you as:</h4>
    <button class="btn btn-outline-primary answer-btn" data-type="explorer">Adventurous</button>
    <button class="btn btn-outline-primary answer-btn" data-type="artist">Creative</button>
    <button class="btn btn-outline-primary answer-btn" data-type="leader">Confident</button>
    <button class="btn btn-outline-primary answer-btn" data-type="thinker">Smart</button>
  </div>
</div>

    
    
    <!-- End quiz element -->

    <!-- Add more quiz elements here -->



    <div class="container d-flex justify-content-center">
      <button id="show-result" class="btn btn-success my-4">Show Results</button>
    </div>    
    <!-- Output the result here -->
    <div class="container d-flex justify-content-center">
      <div id="result-container" class="card p-4 mb-4" style="width: 75%; display: none;">
        <h3>Your Result:</h3>
        <p id="result-text"></p>
      </div>
    </div>
    
    <!-- Connect to your script file here -->
     <script src = "./js/script.js"></script>
</body>
</html>
